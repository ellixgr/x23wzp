<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganhar VIP - Missões</title>
    <style>
        :root { --primary: #b78cff; --success: #2ecc71; --error: #ff4757; --warning: #ffa502; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ebebeb; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .moedas-display { font-size: 50px; font-weight: bold; color: #ff9800; margin: 10px 0; }
        .btn-missao { display: block; background: #ff4500; color: white; padding: 16px; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; border: none; width: 100%; transition: 0.2s; }
        .btn-resgatar { background: var(--primary); margin-top: 12px; }
        .disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.7; }
        #toast-container { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 15px 25px; border-radius: 50px; transition: 0.5s; z-index: 9999; }
        #toast-container.show { top: 25px; }
        .debug-id { margin-top: 20px; font-size: 10px; color: #999; word-break: break-all; background: #fdfdfd; padding: 8px; border-radius: 8px; border: 1px solid #eee; }
        .status { font-size: 13px; margin-top: 8px; color: var(--success); font-weight: bold; }
    </style>
</head>
<body>

    <div id="toast-container"><span id="toast-message"></span></div>

    <div class="card">
        <h2>Minhas Moedas</h2>
        <div class="moedas-display" id="moedasTxt">...</div>
        <p style="font-size: 14px; color: #666;">Junte <b>30 moedas</b> para VIP 24h</p>
        
        <div id="statusDia" class="status">Sincronizando...</div>

        <button id="btnVideo" class="btn-missao disabled">🎬 ASSISTIR VÍDEO AGORA</button>
        <div id="timer" style="display:none; margin-top:10px;">⏳ Validando em <span id="segundos">15</span>s...</div>
        
        <button id="btnResgatar" class="btn-missao btn-resgatar">⭐ GERAR VIP 24H (30 Moedas)</button>
        
        <div class="debug-id">
            SEU ID PARA O ADMIN: <br>
            <b id="exibir-meu-id" style="color:#3498db"></b>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsrYjO2yVTemKqwmJRzNjh5sfaMalPqhE",
            databaseURL: "https://cliques-4a2c1-default-rtdb.firebaseio.com",
            projectId: "cliques-4a2c1",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CONFIGURAÇÕES ---
        const LIMITE_DIARIO = 100;
        const PRECO_VIP = 30;

        // --- CONTROLE DE USUÁRIO ---
        let meuId = localStorage.getItem('usuario_uid');
        if (!meuId) {
            meuId = "user_" + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('usuario_uid', meuId);
        }
        document.getElementById('exibir-meu-id').innerText = meuId;

        const moedasTxt = document.getElementById('moedasTxt');
        const btnVideo = document.getElementById('btnVideo');
        const statusDia = document.getElementById('statusDia');
        
        let moedasBD = 0;
        let limiteDiarioLocal = parseInt(localStorage.getItem('limiteDiario')) || 0;
        const hoje = new Date().toLocaleDateString();

        if (localStorage.getItem('ultimaDataMissao') !== hoje) {
            limiteDiarioLocal = 0;
            localStorage.setItem('limiteDiario', 0);
            localStorage.setItem('ultimaDataMissao', hoje);
        }

        // --- ESCUTAR BANCO ---
        onValue(ref(db, 'usuarios/' + meuId), (snap) => {
            const data = snap.val();
            moedasBD = (data && data.moedas) ? data.moedas : 0;
            moedasTxt.innerText = moedasBD;
            atualizarUI();
        });

        let meusVideos = [];
        onValue(ref(db, 'videos_shopee'), (snap) => {
            meusVideos = [];
            snap.forEach(c => { if(c.val().link) meusVideos.push(c.val().link); });
            atualizarUI();
        });

        function atualizarUI() {
            if (limiteDiarioLocal >= LIMITE_DIARIO) {
                btnVideo.classList.add('disabled');
                btnVideo.innerText = "LIMITE DIÁRIO ATINGIDO";
                statusDia.innerText = "Volte amanhã!";
            } else if (meusVideos.length > 0) {
                btnVideo.classList.remove('disabled');
                btnVideo.innerText = "🎬 ASSISTIR VÍDEO AGORA";
                statusDia.innerText = `Missões: ${limiteDiarioLocal}/${LIMITE_DIARIO} hoje`;
            } else {
                statusDia.innerText = "Carregando vídeos...";
            }
        }

        // --- GANHAR MOEDA ---
        btnVideo.onclick = () => {
            if (limiteDiarioLocal >= LIMITE_DIARIO || meusVideos.length === 0) return;

            window.open(meusVideos[Math.floor(Math.random() * meusVideos.length)], '_blank');
            btnVideo.classList.add('disabled');
            document.getElementById('timer').style.display = 'block';

            let tempo = 15;
            let count = setInterval(async () => {
                tempo--;
                document.getElementById('segundos').innerText = tempo;
                if (tempo <= 0) {
                    clearInterval(count);
                    
                    // Atualiza no Firebase
                    await update(ref(db, 'usuarios/' + meuId), { moedas: moedasBD + 1 });
                    
                    limiteDiarioLocal++;
                    localStorage.setItem('limiteDiario', limiteDiarioLocal);
                    document.getElementById('timer').style.display = 'none';
                    notify("Você ganhou 1 moeda!");
                }
            }, 1000);
        };

        // --- RESGATAR VIP ---
        document.getElementById('btnResgatar').onclick = async () => {
            if (moedasBD < PRECO_VIP) return notify("Você precisa de " + PRECO_VIP + " moedas!", "error");

            const cod = "VIP-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            
            try {
                await set(ref(db, 'codigos_vips/' + cod), { duracaoHoras: 24, usado: false });
                await update(ref(db, 'usuarios/' + meuId), { moedas: moedasBD - PRECO_VIP });
                alert("SUCESSO! SEU CÓDIGO VIP: " + cod);
            } catch (e) {
                notify("Erro ao gerar VIP", "error");
            }
        };

        function notify(msg) {
            const t = document.getElementById('toast-container');
            document.getElementById('toast-message').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
