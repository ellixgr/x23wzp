<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conteúdo Exclusivo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { background-color: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        
        .video-container {
            width: 100%; max-width: 560px; aspect-ratio: 16 / 9;
            margin-bottom: 20px; border: 2px solid #fff; border-radius: 12px;
            overflow: hidden; position: relative; background-color: #000;
        }

        /* O vídeo agora NÃO tem controls, por isso não tem 3 pontinhos */
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Barra de controle personalizada */
        .custom-controls {
            position: absolute; bottom: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.6); padding: 10px; box-sizing: border-box;
        }

        .custom-controls button {
            background: none; border: none; color: white;
            font-size: 20px; cursor: pointer;
        }

        .btn-telegram {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            background-color: #229ED9; color: #fff; text-decoration: none; padding: 15px 30px;
            font-size: 18px; font-weight: bold; border-radius: 30px; margin-bottom: 25px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="video-container">
        <video id="meuVideo" playsinline>
            <source src="https://ellixgr.github.io/x23wzp/1783749723785.mp4" type="video/mp4">
        </video>

        <!-- Meus próprios botões (Sem 3 pontinhos!) -->
        <div class="custom-controls">
            <button onclick="togglePlay()"><i id="playIcon" class="fa-solid fa-play"></i></button>
            <button onclick="toggleMute()"><i id="muteIcon" class="fa-solid fa-volume-high"></i></button>
            <button onclick="toggleFS()"><i class="fa-solid fa-expand"></i></button>
        </div>
    </div>

    <a href="https://t.me/+Me11HHGOfFhjOTMx" target="_blank" class="btn-telegram">
        <i class="fa-brands fa-telegram"></i> ENTRAR NO GRUPO
    </a>

    <div class="banner-ad">
        <script async="async" data-cfasync="false" src="https://pl28627138.effectivecpmnetwork.com/1fd37c2a1d9d1e19537dc1d7d97cdc9b/invoke.js"></script>
        <div id="container-1fd37c2a1d9d1e19537dc1d7d97cdc9b"></div>
    </div>
    
    <script>
        var video = document.getElementById('meuVideo');
        
        function togglePlay() {
            if (video.paused) {
                video.play();
                document.getElementById('playIcon').className = 'fa-solid fa-pause';
                dispararAnuncioSeguro(); // Dispara o Adsterra no primeiro play
            } else {
                video.pause();
                document.getElementById('playIcon').className = 'fa-solid fa-play';
            }
        }

        function toggleMute() {
            video.muted = !video.muted;
            document.getElementById('muteIcon').className = video.muted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
        }

        function toggleFS() {
            if (video.requestFullscreen) video.requestFullscreen();
        }

        function dispararAnuncioSeguro() {
            if (!sessionStorage.getItem('anuncioDisparado')) {
                sessionStorage.setItem('anuncioDisparado', 'true');
                window.open('https://www.effectivecpmnetwork.com/y99yjf7v3y?key=5f6de430d75a855ddff7717775ff4ae3', '_blank');
            }
        }
    </script>
</body>
</html>
