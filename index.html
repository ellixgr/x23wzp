    <style>
        :root {
            --primary: #b78cff;
            --led-blue: #00d2ff;
            --dark-bg: #0f111a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;}
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1e2e 0%, #0f111a 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 50px;
            user-select: none;
            overflow-x: hidden;
        }

        /* Menu Futurista */
        .menu-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            font-size: 24px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            z-index: 20000;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: rgba(15, 17, 26, 0.95);
            backdrop-filter: blur(20px);
            padding: 60px 20px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 19999;
            border-left: 1px solid var(--led-blue);
        }

        .side-menu.active { right: 0; }
        .side-menu a {
            display: block;
            text-decoration: none;
            color: #eee;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            background: var(--glass);
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Elementos de Brilho */
        .aviso-click {
            font-size: 10px;
            color: #ff4444;
            font-weight: 900;
            margin: 15px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* LED Box Principal */
        .led-box {
            position: relative;
            width: 92%;
            max-width: 380px;
            height: 180px;
            padding: 3px;
            background: #000;
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            margin-bottom: 25px;
        }

        .led-box::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background-image: conic-gradient(transparent, transparent, transparent, var(--led-blue));
            animation: rotateLed 3s linear infinite;
        }

        @keyframes rotateLed { 0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);} }

        .linktree-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 22px;
            overflow: hidden;
            z-index: 10;
            background: #000;
        }

        .linktree-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        .btn-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid var(--led-blue);
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 0 20px var(--led-blue);
            white-space: nowrap;
        }

        /* Vídeo Container */
        .video-container {
            width: 92%;
            max-width: 380px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .video-container video { width: 100%; display: block; }

        .mute-btn {
            position: absolute;
            top: 15px; left: 15px; z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* AdWrapper Futurista */
        .ad-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
        
        .ad-card {
            width: 92%;
            max-width: 380px;
            background: var(--glass);
            border-radius: 20px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .ad-card:active { transform: scale(0.98); }
        .ad-card img { width: 100%; border-radius: 15px; display: block; }

        footer { margin-top: 50px; color: #444; font-size: 10px; letter-spacing: 1px; }

    </style>
</head>

        function toggleMute(event) {
