<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .btn-novo-site {
            width: 92%;
            max-width: 380px;
            height: 120px;
            background: #25d366;
            color: #000;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: 900;
            font-size: 22px;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
            transition: transform 0.2s ease;
        }
        .btn-novo-site:hover {
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <a href="https://ellixgr.github.io/flow/" target="_blank" rel="noopener noreferrer" class="btn-novo-site">
        NOVO SITE 🚀
    </a>
</body>
</html>
