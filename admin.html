<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADMIN PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #b78cff; --vip: #ffd700; --danger: #ff4d4d; --success: #2ecc71; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 450px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card p { margin: 5px 0 0; font-size: 22px; font-weight: bold; color: var(--primary); }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; margin-bottom: 20px; box-sizing: border-box; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-weight: bold; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; }

        #btn-copiar { background: #f0ebff; color: #7d5fff; border: 2px dashed var(--primary); margin-top: 15px; display: none; font-size: 18px; }

        #area-admin { display: none; width: 100%; max-width: 450px; }
        
        .lista-codigos { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
        .codigo-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        .status-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .status-livre { background: #e8f5e9; color: #2e7d32; }
        .status-uso { background: #fff3e0; color: #ef6c00; }
        
        .item-grupo { background: white; padding: 15px; margin-top: 12px; border-radius: 12px; border-left: 5px solid #ccc; position: relative; }
        .item-grupo.is-vip { border-left-color: var(--vip); background: #fffdf0; }
        
        .btns-acao-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .btns-acao-grid button { padding: 8px 0; font-size: 12px; margin-top: 0; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
        label { font-size: 11px; font-weight: bold; color: #888; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2 style="text-align:center; color:var(--primary)">🛡️ Admin Login</h2>
        <input type="text" id="user-input" placeholder="Usuário">
        <input type="password" id="pass-input" placeholder="Senha Mestra">
        <button onclick="logar()">ENTRAR NO PAINEL</button>
    </div>

    <div id="area-admin">
        <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px;">
            <span style="font-size: 12px; color: #888;">User: <b>https67</b></span>
            <a href="#" onclick="logout()" style="color:red; font-size: 12px; text-decoration: none; font-weight: bold;">SAIR</a>
        </div>

        <div class="stats-container">
            <div class="stat-card"><h4>Grupos</h4><p id="count-total">0</p></div>
            <div class="stat-card"><h4>VIPs</h4><p id="count-vip">0</p></div>
        </div>

        <div class="card">
            <h3 style="margin:0">⭐ Gerar VIP</h3>
            <select id="tempo-vip">
                <option value="24">24 Horas</option>
                <option value="48">48 Horas</option>
            </select>
            <button onclick="gerarCodigo()">GERAR AGORA</button>
            <button id="btn-copiar" onclick="copiarCodigo()"></button>
            
            <h4 style="margin: 15px 0 5px; font-size: 11px; color: #999;">MONITOR DE CÓDIGOS (ESTADO NO BANCO):</h4>
            <div id="lista-codigos-ativos" class="lista-codigos">Carregando...</div>
        </div>

        <h2 style="font-size: 16px; color: #555;">LISTA DE GRUPOS</h2>
        <div id="lista-grupos"></div>
    </div>

    <div id="modalEdicao" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Editar Grupo</h3>
            <label>NOME</label><input type="text" id="edit-nome">
            <label>LINK WHATSAPP</label><input type="text" id="edit-link">
            <label>LINK FOTO</label><input type="text" id="edit-foto">
            <label>CÓDIGO VIP (OPCIONAL)</label><input type="text" id="edit-cod-vip" placeholder="COLE O CÓDIGO AQUI">

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="salvarEdicao()" style="background:var(--success)">SALVAR</button>
                <button onclick="fecharModal()" style="background:#888">CANCELAR</button>
            </div>
            <button onclick="excluirAtual()" style="background:var(--danger); margin-top:10px">EXCLUIR GRUPO</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsrYjO2yVTemKqwmJRzNjh5sfaMalPqhE",
        authDomain: "cliques-4a2c1.firebaseapp.com",
        databaseURL: "https://cliques-4a2c1-default-rtdb.firebaseio.com",
        projectId: "cliques-4a2c1",
        storageBucket: "cliques-4a2c1.firebase storage.app",
        messagingSenderId: "903875153255",
        appId: "1:903875153255:web:ff3cf25e059b10d665b3c2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let SENHA_MASTER = localStorage.getItem('admin_acesso') || "";
    let idSendoEditado = null;
    let gruposCache = {};

    if(SENHA_MASTER) mostrarPainel();

    window.logar = async function() {
        const u = document.getElementById('user-input').value;
        const s = document.getElementById('pass-input').value;
        if(u !== "https67") return alert("Usuário Errado!");

        const res = await fetch("https://x23wzp.onrender.com/login-admin", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ senha: s })
        });

        if(res.ok) {
            SENHA_MASTER = s;
            localStorage.setItem('admin_acesso', s);
            mostrarPainel();
        } else { alert("Senha Incorreta!"); }
    }

    function mostrarPainel() {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('area-admin').style.display = 'block';
        carregarDados();
    }

    function carregarDados() {
        // Estatísticas e Grupos
        onValue(ref(db, 'grupos'), (snap) => {
            const lista = document.getElementById('lista-grupos');
            const totalTxt = document.getElementById('count-total');
            const vipTxt = document.getElementById('count-vip');
            lista.innerHTML = "";
            gruposCache = snap.val() || {};
            let t = 0, v = 0;
            snap.forEach(c => {
                const g = c.val(); t++; if(g.vip) v++;
                const div = document.createElement('div');
                div.className = `item-grupo ${g.vip ? 'is-vip' : ''}`;
                div.innerHTML = `<b>${g.nome}</b> ${g.vip ? '⭐' : ''}
                    <div class="btns-acao-grid">
                        <button style="background:var(--blue)" onclick="abrirModal('${c.key}')">EDITAR</button>
                        <button style="background:#555" onclick="window.open('${g.link}')">LINK</button>
                        <button style="background:var(--danger)" onclick="excluirGrp('${c.key}')">DEL</button>
                    </div>`;
                lista.appendChild(div);
            });
            totalTxt.innerText = t; vipTxt.innerText = v;
        });

        // Lista de Códigos (Lê de 'codigos_vips' conforme a sua imagem)
        onValue(ref(db, 'codigos_vips'), (snap) => {
            const cont = document.getElementById('lista-codigos-ativos');
            cont.innerHTML = "";
            if(!snap.exists()) {
                cont.innerHTML = "<p style='color:#999;padding:10px'>Nenhum código gerado.</p>";
                return;
            }

            snap.forEach(c => {
                const codKey = c.key;
                const dadosCod = c.val();
                
                // Verifica se este código consta em algum grupo no cache
                let grupoEmUso = "NÃO";
                let badgeClass = "status-livre";
                
                for(let gid in gruposCache) {
                    if(gruposCache[gid].codigoVip === codKey) {
                        grupoEmUso = "EM USO";
                        badgeClass = "status-uso";
                        break;
                    }
                }

                const div = document.createElement('div');
                div.className = 'codigo-item';
                div.innerHTML = `
                    <div style="display:flex; flex-direction:column">
                        <span style="font-weight:bold; font-family:monospace">${codKey}</span>
                        <span class="status-badge ${badgeClass}">${grupoEmUso}</span>
                    </div>
                    <i class="fa fa-trash" style="color:var(--danger);cursor:pointer" onclick="apagarCod('${codKey}')"></i>
                `;
                cont.appendChild(div);
            });
        });
    }

    window.gerarCodigo = async function() {
        const h = document.getElementById('tempo-vip').value;
        const res = await fetch("https://x23wzp.onrender.com/gerar-vip", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ senha: SENHA_MASTER, duracaoHoras: parseInt(h) })
        });
        const data = await res.json();
        const b = document.getElementById('btn-copiar');
        b.innerText = data.codigo;
        b.style.display = "block";
    }

    window.copiarCodigo = () => {
        const b = document.getElementById('btn-copiar');
        navigator.clipboard.writeText(b.innerText);
        const original = b.innerText;
        b.innerText = "COPIADO!";
        setTimeout(() => { b.innerText = original; }, 1000);
    }

    window.abrirModal = (id) => {
        idSendoEditado = id;
        const g = gruposCache[id];
        document.getElementById('edit-nome').value = g.nome;
        document.getElementById('edit-link').value = g.link;
        document.getElementById('edit-foto').value = g.foto || "";
        document.getElementById('edit-cod-vip').value = "";
        document.getElementById('modalEdicao').style.display = 'flex';
    }

    window.salvarEdicao = async () => {
        const cod = document.getElementById('edit-cod-vip').value.trim();
        const updateData = {
            nome: document.getElementById('edit-nome').value,
            link: document.getElementById('edit-link').value,
            foto: document.getElementById('edit-foto').value
        };

        if(cod) {
            const res = await fetch("https://x23wzp.onrender.com/validar-vip", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ codigo: cod, grupoId: idSendoEditado })
            });
            if(!res.ok) return alert("Código Inválido ou em Uso!");
            // Nota: Se o servidor validar, ele já deve atualizar o status VIP no Firebase.
        }
        
        await update(ref(db, 'grupos/' + idSendoEditado), updateData);
        fecharModal();
    }

    window.apagarCod = (c) => confirm("Apagar este código permanentemente?") && remove(ref(db, 'codigos_vips/' + c));
    window.excluirGrp = (id) => confirm("Apagar grupo definitivamente?") && remove(ref(db, 'grupos/' + id));
    window.excluirAtual = () => { excluirGrp(idSendoEditado); fecharModal(); }
    window.fecharModal = () => document.getElementById('modalEdicao').style.display = 'none';
    window.logout = () => { localStorage.clear(); location.reload(); };
</script>
</body>
</html>
