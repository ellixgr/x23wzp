<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ PAINEL ADMIN PRO - GESTÃO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #b78cff; --vip: #ffd700; --danger: #ff4d4d; --success: #2ecc71; --blue: #3498db; --boost: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        .stats-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; max-width: 500px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card h4 { margin: 0; font-size: 12px; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 18px; font-weight: bold; color: var(--primary); }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-weight: bold; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; }

        #btn-copiar { background: #f0ebff; color: #7d5fff; border: 2px dashed var(--primary); margin-top: 15px; display: none; font-size: 18px; }

        #area-admin { display: none; width: 100%; max-width: 500px; }
        
        .lista-codigos { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .codigo-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        
        /* Estilos do Cartão do Grupo */
        .item-grupo { background: white; padding: 15px; margin-top: 12px; border-radius: 12px; border-left: 5px solid #ccc; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-grupo.is-vip { border-left-color: var(--vip); background: #fffdf0; }
        .item-grupo.is-boosted { border-left-color: var(--boost); }
        
        .info-dono { font-size: 11px; color: #777; margin-top: 5px; line-height: 1.4; }
        .info-dono b { color: #333; }
        .badge-vip-time { color: #d35400; font-weight: bold; font-size: 10px; background: #fff3e0; padding: 2px 5px; border-radius: 4px; }

        .btns-acao-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .btns-acao-grid button { padding: 8px 0; font-size: 10px; margin-top: 0; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
        label { font-size: 11px; font-weight: bold; color: #888; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2 style="text-align:center; color:var(--primary)">Login</h2>
        <input type="text" id="user-input" placeholder="Usuário">
        <input type="password" id="pass-input" placeholder="Senha Mestra">
        <button onclick="logar()">ENTRAR</button>
    </div>

    <div id="area-admin">
        <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px;">
            <span style="font-size: 12px; color: #888;">User: <b>https67</b></span>
            <a href="#" onclick="logout()" style="color:red; font-size: 12px; text-decoration: none; font-weight: bold;">SAIR</a>
        </div>

        <div class="stats-container">
            <div class="stat-card"><h4>Grupos</h4><p id="count-total">0</p></div>
            <div class="stat-card"><h4>VIPs</h4><p id="count-vip">0</p></div>
            <div class="stat-card"><h4>Boost</h4><p id="count-boost">0</p></div>
        </div>

        <div class="card" style="border-top: 4px solid var(--success);">
            <h3 style="margin:0; color: var(--success);"><i class="fa fa-coins"></i> Dar Moedas por ID</h3>
            <input type="text" id="moeda-user-id" placeholder="ID do Usuário">
            <input type="number" id="moeda-qtd" placeholder="Quantidade de Moedas">
            <button onclick="adicionarMoedasManual()" style="background:var(--success)">ADICIONAR MOEDAS</button>
        </div>

        <div class="card">
            <h3 style="margin:0">⭐ Gerar Código VIP</h3>
            <select id="tempo-vip">
                <option value="2">2 Horas</option>
                <option value="24">24 Horas</option>
                <option value="48">48 Horas</option>
            </select>
            <button onclick="gerarCodigo()">GERAR AGORA</button>
            <button id="btn-copiar" onclick="copiarCodigo()"></button>
            
            <h4 style="margin: 15px 0 5px; font-size: 11px; color: #999;">CÓDIGOS DISPONÍVEIS:</h4>
            <div id="lista-codigos-ativos" class="lista-codigos">Carregando...</div>
        </div>

        <div class="card" style="border-top: 4px solid #ff4500;">
            <h3 style="margin:0; color: #ff4500;"><i class="fa fa-video"></i> Gerenciar Vídeos Shopee</h3>
            <input type="text" id="novo-video-link" placeholder="https://shopee.com.br/...">
            <button onclick="adicionarVideo()" style="background:#ff4500">ADICIONAR VÍDEO</button>
            <h4 style="margin: 15px 0 5px; font-size: 11px; color: #999;">VÍDEOS ATIVOS:</h4>
            <div id="lista-videos-shopee" class="lista-codigos">Carregando...</div>
        </div>

        <h2 style="font-size: 16px; color: #555;">GERENCIAR GRUPOS</h2>
        <div id="lista-grupos"></div>
    </div>

    <div id="modalEdicao" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Editar Grupo</h3>
            <label>NOME</label><input type="text" id="edit-nome">
            <label>LINK WHATSAPP</label><input type="text" id="edit-link">
            <label>LINK FOTO</label><input type="text" id="edit-foto">
            <label>CÓDIGO VIP (ATIVO)</label><input type="text" id="edit-cod-vip" placeholder="Cole novo ou deixe em branco">

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="salvarEdicao()" style="background:var(--success)">SALVAR</button>
                <button onclick="fecharModal()" style="background:#888">CANCELAR</button>
            </div>
            <button onclick="excluirAtual()" style="background:var(--danger); margin-top:10px">EXCLUIR GRUPO</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, update, get, push, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsrYjO2yVTemKqwmJRzNjh5sfaMalPqhE",
        databaseURL: "https://cliques-4a2c1-default-rtdb.firebaseio.com",
        projectId: "cliques-4a2c1",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let SENHA_MASTER = localStorage.getItem('admin_acesso') || "";
    let idSendoEditado = null;
    let gruposCache = {};

    if(SENHA_MASTER) mostrarPainel();

    window.logar = async function() {
        const u = document.getElementById('user-input').value;
        const s = document.getElementById('pass-input').value;
        if(u !== "https67") return alert("Usuário Errado!");
        const res = await fetch("https://x23wzp.onrender.com/login-admin", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ senha: s })
        });
        if(res.ok) {
            SENHA_MASTER = s;
            localStorage.setItem('admin_acesso', s);
            mostrarPainel();
        } else { alert("Senha Incorreta!"); }
    }

    function mostrarPainel() {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('area-admin').style.display = 'block';
        carregarDados();
    }

    // FUNÇÃO PARA ADICIONAR MOEDAS MANUALMENTE PELO ID
    window.adicionarMoedasManual = async function() {
        const userId = document.getElementById('moeda-user-id').value.trim();
        const qtd = parseInt(document.getElementById('moeda-qtd').value);
        if(!userId || isNaN(qtd)) return alert("Preencha o ID e a quantidade!");
        
        const userRef = ref(db, 'usuarios/' + userId);
        const snap = await get(userRef);
        let moedasAtuais = 0;
        if(snap.exists()) moedasAtuais = snap.val().moedas || 0;
        
        await update(userRef, { moedas: moedasAtuais + qtd });
        alert(`Sucesso! Adicionado ${qtd} moedas ao ID: ${userId}`);
        document.getElementById('moeda-user-id').value = "";
        document.getElementById('moeda-qtd').value = "";
    }

    function formatarTempo(ms) {
        if (ms <= 0) return "";
        const horas = Math.floor(ms / 3600000);
        const mins = Math.floor((ms % 3600000) / 60000);
        return `${horas}h ${mins}m restantes`;
    }

    function carregarDados() {
        onValue(ref(db, 'grupos'), async (snap) => {
            const lista = document.getElementById('lista-grupos');
            lista.innerHTML = "";
            gruposCache = snap.val() || {};
            let t = 0, v = 0, b = 0;
            const agora = Date.now();

            for (const key in gruposCache) {
                const g = gruposCache[key]; t++;
                
                // Pegar moedas do dono em tempo real
                const donoSnap = await get(ref(db, 'usuarios/' + g.donoId));
                const moedasDono = donoSnap.exists() ? donoSnap.val().moedas : 0;

                let vipStatusHtml = "";
                if(g.vip && g.vipAte > agora) {
                    v++;
                    vipStatusHtml = `<span class="badge-vip-time">${formatarTempo(g.vipAte - agora)}</span>`;
                }

                const tempoImpulso = agora - (g.ultimoImpulso || 0);
                const isBoosted = tempoImpulso < 3600000;
                if(isBoosted) b++;

                const div = document.createElement('div');
                div.className = `item-grupo ${g.vip && g.vipAte > agora ? 'is-vip' : ''} ${isBoosted ? 'is-boosted' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <b>${g.nome}</b> 
                        ${vipStatusHtml}
                    </div>
                    <div class="info-dono">
                        ID Dono: <b>${g.donoId || '---'}</b><br>
                        Saldo Moedas: <b style="color:#ff9800">${moedasDono} moedas</b>
                    </div>
                    <div class="btns-acao-grid">
                        <button style="background:var(--blue)" onclick="abrirModal('${key}')">EDITAR</button>
                        <button style="background:#555" onclick="window.open('${g.link}')">VER</button>
                        <button style="background:var(--boost); color:#000" onclick="removerBoost('${key}')">B. LIMPAR</button>
                        <button style="background:var(--danger)" onclick="excluirGrp('${key}')">DEL</button>
                    </div>`;
                lista.appendChild(div);
            }
            document.getElementById('count-total').innerText = t;
            document.getElementById('count-vip').innerText = v;
            document.getElementById('count-boost').innerText = b;
        });

        // Códigos e Vídeos permanecem iguais
        onValue(ref(db, 'codigos_vips'), (snap) => {
            const cont = document.getElementById('lista-codigos-ativos');
            cont.innerHTML = "";
            snap.forEach(c => {
                const div = document.createElement('div');
                div.className = 'codigo-item';
                div.innerHTML = `<span><b>${c.key}</b> (${c.val().duracaoHoras}h)</span><i class="fa fa-trash" style="color:var(--danger);cursor:pointer" onclick="apagarCod('${c.key}')"></i>`;
                cont.appendChild(div);
            });
        });

        onValue(ref(db, 'videos_shopee'), (snap) => {
            const cont = document.getElementById('lista-videos-shopee');
            cont.innerHTML = "";
            snap.forEach(c => {
                const div = document.createElement('div');
                div.className = 'codigo-item';
                div.innerHTML = `<span style="overflow:hidden; text-overflow:ellipsis; width:80%">${c.val().link}</span><i class="fa fa-trash" style="color:red;cursor:pointer" onclick="apagarVideo('${c.key}')"></i>`;
                cont.appendChild(div);
            });
        });
    }

    window.adicionarVideo = async function() {
        const link = document.getElementById('novo-video-link').value.trim();
        if(!link) return;
        await push(ref(db, 'videos_shopee'), { link: link });
        document.getElementById('novo-video-link').value = "";
    }

    window.apagarVideo = (id) => confirm("Apagar?") && remove(ref(db, 'videos_shopee/' + id));
    window.removerBoost = (id) => update(ref(db, 'grupos/' + id), { ultimoImpulso: 0 });
    window.gerarCodigo = async function() {
        const h = document.getElementById('tempo-vip').value;
        const res = await fetch("https://x23wzp.onrender.com/gerar-vip", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ senha: SENHA_MASTER, duracaoHoras: parseInt(h) })
        });
        const data = await res.json();
        const b = document.getElementById('btn-copiar');
        b.innerText = data.codigo;
        b.style.display = "block";
    }
    window.copiarCodigo = () => { navigator.clipboard.writeText(document.getElementById('btn-copiar').innerText); alert("Copiado!"); }
    window.abrirModal = (id) => {
        idSendoEditado = id;
        const g = gruposCache[id];
        document.getElementById('edit-nome').value = g.nome;
        document.getElementById('edit-link').value = g.link;
        document.getElementById('edit-foto').value = g.foto || "";
        document.getElementById('edit-cod-vip').value = g.codigoVip || "";
        document.getElementById('modalEdicao').style.display = 'flex';
    }
    window.salvarEdicao = async () => {
        const inputCod = document.getElementById('edit-cod-vip').value.trim();
        const updateData = {
            nome: document.getElementById('edit-nome').value,
            link: document.getElementById('edit-link').value,
            foto: document.getElementById('edit-foto').value
        };
        if (inputCod !== "" && inputCod !== gruposCache[idSendoEditado].codigoVip) {
            const codSnap = await get(ref(db, 'codigos_vips/' + inputCod));
            if(codSnap.exists()) {
                updateData.vip = true;
                updateData.codigoVip = inputCod;
                updateData.vipAte = Date.now() + (codSnap.val().duracaoHoras * 3600000);
                await remove(ref(db, 'codigos_vips/' + inputCod));
            }
        }
        await update(ref(db, 'grupos/' + idSendoEditado), updateData);
        fecharModal();
    }
    window.apagarCod = (c) => remove(ref(db, 'codigos_vips/' + c));
    window.excluirGrp = (id) => confirm("Apagar?") && remove(ref(db, 'grupos/' + id));
    window.excluirAtual = () => { excluirGrp(idSendoEditado); fecharModal(); }
    window.fecharModal = () => document.getElementById('modalEdicao').style.display = 'none';
    window.logout = () => { localStorage.removeItem('admin_acesso'); location.reload(); };
</script>
</body>
</html>
