<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin Completo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; margin-bottom: 20px; }
        h2 { color: #b78cff; text-align: center; margin-top:0; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #b78cff; color: white; border: none; font-weight: bold; cursor: pointer; }
        #area-admin { display: none; width: 100%; max-width: 450px; }
        .item-grupo { background: white; padding: 15px; margin-top: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btns-acao { display: flex; gap: 8px; }
        .btn-edit { background: #3498db; width: 40px; }
        .btn-del { background: #ff4d4d; width: 40px; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2>Painel Admin</h2>
        <input type="password" id="pass-input" placeholder="Senha Mestra">
        <button onclick="logar()">Acessar</button>
    </div>

    <div id="area-admin">
        <div class="card">
            <h2>⭐ Gerar VIP</h2>
            <label style="font-size:12px; color:#666;">Duração do Código:</label>
            <select id="tempo-vip">
                <option value="24">24 Horas</option>
                <option value="48">48 Horas</option>
                <option value="168">7 Dias</option>
            </select>
            <button id="btn-gerar" onclick="gerarCodigo()">Gerar Código VIP</button>
            <div id="res-vip" style="margin-top:15px; text-align:center; font-weight:bold; color:#2ecc71; font-size:20px;"></div>
        </div>

        <div class="card">
            <h2>📋 Gerenciar Grupos</h2>
            <div id="lista-grupos">Carregando...</div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsrYjO2yVTemKqwmJRzNjh5sfaMalPqhE",
        authDomain: "cliques-4a2c1.firebaseapp.com",
        databaseURL: "https://cliques-4a2c1-default-rtdb.firebaseio.com",
        projectId: "cliques-4a2c1",
        storageBucket: "cliques-4a2c1.firebase storage.app",
        messagingSenderId: "903875153255",
        appId: "1:903875153255:web:ff3cf25e059b10d665b3c2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let SENHA_MASTER = "";

    window.logar = async function() {
        const s = document.getElementById('pass-input').value;
        try {
            const res = await fetch("https://x23wzp.onrender.com/login-admin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ senha: s })
            });
            if(res.ok) {
                SENHA_MASTER = s;
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('area-admin').style.display = 'block';
                carregarGrupos();
            } else { alert("Senha incorreta!"); }
        } catch(e) { alert("Erro de conexão."); }
    }

    window.gerarCodigo = async function() {
        const h = document.getElementById('tempo-vip').value;
        const btn = document.getElementById('btn-gerar');
        btn.innerText = "Processando...";
        try {
            const res = await fetch("https://x23wzp.onrender.com/gerar-vip", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ senha: SENHA_MASTER, duracaoHoras: h })
            });
            const data = await res.json();
            document.getElementById('res-vip').innerText = data.codigo;
        } catch(e) { alert("Erro ao gerar."); }
        btn.innerText = "Gerar Código VIP";
    }

    function carregarGrupos() {
        onValue(ref(db, 'grupos'), (snap) => {
            const div = document.getElementById('lista-grupos');
            div.innerHTML = "";
            snap.forEach((child) => {
                const g = child.val();
                const item = document.createElement('div');
                item.className = 'item-grupo';
                item.innerHTML = `
                    <span>${g.nome}</span>
                    <div class="btns-acao">
                        <button class="btn-edit" onclick="editar('${child.key}', '${g.nome}', '${g.imagem}', '${g.link}')">✎</button>
                        <button class="btn-del" onclick="excluir('${child.key}')">X</button>
                    </div>
                `;
                div.appendChild(item);
            });
        });
    }

    window.excluir = (id) => confirm("Excluir grupo?") && remove(ref(db, 'grupos/' + id));
    window.editar = (id, n, i, l) => {
        const novoNome = prompt("Nome:", n);
        const novaImg = prompt("Link Foto:", i);
        const novoLink = prompt("Link Grupo:", l);
        if(novoNome) update(ref(db, 'grupos/' + id), { nome: novoNome, imagem: novaImg, link: novoLink });
    }
</script>
</body>
</html>
