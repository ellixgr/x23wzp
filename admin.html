<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #b78cff; --vip: #ffd700; --danger: #ff4d4d; --success: #2ecc71; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        /* Stats */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 450px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card p { margin: 5px 0 0; font-size: 20px; font-weight: bold; color: var(--primary); }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; margin-bottom: 20px; box-sizing: border-box; }
        
        /* Input Login com Olhinho */
        .pass-wrapper { position: relative; width: 100%; }
        .pass-wrapper i { position: absolute; right: 15px; top: 22px; cursor: pointer; color: #666; }

        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }

        /* Botão de Cópia */
        #btn-copiar { background: #f0ebff; color: #7d5fff; border: 2px dashed var(--primary); margin-top: 15px; display: none; font-size: 18px; }

        #area-admin { display: none; width: 100%; max-width: 450px; }

        /* Lista de Códigos no Firebase */
        .lista-codigos { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
        .codigo-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .codigo-item b { color: #555; }
        .btn-del-cod { color: var(--danger); cursor: pointer; background: none; width: auto; padding: 5px; margin: 0; }

        /* Lista de Grupos */
        .item-grupo { background: white; padding: 15px; margin-top: 12px; border-radius: 12px; border-left: 5px solid #ccc; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .item-grupo.is-vip { border-left-color: var(--vip); background: #fffdf0; }
        .btns-acao-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .btns-acao-grid button { padding: 8px 0; font-size: 12px; margin-top: 0; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
        label { font-size: 11px; font-weight: bold; color: #888; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2 style="text-align:center; color:var(--primary)">🛡️ Admin Login</h2>
        <div class="pass-wrapper">
            <input type="password" id="pass-input" placeholder="Senha Mestra">
            <i class="fa-solid fa-eye" id="togglePass" onclick="toggleSenha()"></i>
        </div>
        <button onclick="logar()" style="margin-top:20px">ENTRAR NO PAINEL</button>
    </div>

    <div id="area-admin">
        <div class="stats-container">
            <div class="stat-card"><h4>Grupos</h4><p id="count-total">0</p></div>
            <div class="stat-card"><h4>VIPs</h4><p id="count-vip">0</p></div>
        </div>

        <div class="card">
            <h2 style="font-size: 18px; margin: 0;">⭐ Criar VIP</h2>
            <select id="tempo-vip">
                <option value="24">24 Horas (Bronze)</option>
                <option value="48">48 Horas (Prata)</option>
            </select>
            <button onclick="gerarCodigo()">GERAR CÓDIGO</button>
            <button id="btn-copiar" onclick="copiarCodigo()"></button>
            
            <h4 style="margin: 20px 0 5px; font-size: 11px; color: #999; text-transform: uppercase;">Códigos Ativos para Uso:</h4>
            <div id="lista-codigos-ativos" class="lista-codigos">Carregando...</div>
        </div>

        <div id="lista-grupos"></div>
    </div>

    <div id="modalEdicao" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Editar Grupo</h3>
            <label>NOME</label><input type="text" id="edit-nome">
            <label>LINK WHATSAPP</label><input type="text" id="edit-link">
            <label>LINK FOTO</label><input type="text" id="edit-foto">
            <label>COLE O CÓDIGO VIP AQUI</label><input type="text" id="edit-cod-vip" placeholder="VIP-XXXX">

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="salvarEdicao()" style="background:var(--success)">SALVAR</button>
                <button onclick="fecharModal()" style="background:#888">FECHAR</button>
            </div>
            <button onclick="excluirAtual()" style="background:var(--danger); margin-top:10px">EXCLUIR GRUPO</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsrYjO2yVTemKqwmJRzNjh5sfaMalPqhE",
        authDomain: "cliques-4a2c1.firebaseapp.com",
        databaseURL: "https://cliques-4a2c1-default-rtdb.firebaseio.com",
        projectId: "cliques-4a2c1",
        storageBucket: "cliques-4a2c1.firebase storage.app",
        messagingSenderId: "903875153255",
        appId: "1:903875153255:web:ff3cf25e059b10d665b3c2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let SENHA_MASTER = "";
    let idSendoEditado = null;

    window.toggleSenha = () => {
        const input = document.getElementById('pass-input');
        input.type = input.type === "password" ? "text" : "password";
    }

    window.logar = async function() {
        const s = document.getElementById('pass-input').value;
        const res = await fetch("https://x23wzp.onrender.com/login-admin", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ senha: s })
        });
        if(res.ok) {
            SENHA_MASTER = s;
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('area-admin').style.display = 'block';
            carregarTudo();
        } else { alert("Senha incorreta!"); }
    }

    function carregarTudo() {
        // Carrega Grupos
        onValue(ref(db, 'grupos'), (snap) => {
            const div = document.getElementById('lista-grupos');
            let total = 0, vips = 0;
            div.innerHTML = "";
            snap.forEach(child => {
                const g = child.val();
                total++; if(g.vip) vips++;
                const item = document.createElement('div');
                item.className = `item-grupo ${g.vip ? 'is-vip' : ''}`;
                item.innerHTML = `<strong>${g.nome}</strong> ${g.vip ? '⭐' : ''}
                    <div class="btns-acao-grid">
                        <button style="background:var(--blue)" onclick="abrirModal('${child.key}', ${JSON.stringify(g).replace(/"/g, '&quot;')})">✏️</button>
                        <button style="background:#555" onclick="window.open('${g.link}')">🔗</button>
                        <button style="background:var(--danger)" onclick="excluirGrupo('${child.key}')">🗑️</button>
                    </div>`;
                div.appendChild(item);
            });
            document.getElementById('count-total').innerText = total;
            document.getElementById('count-vip').innerText = vips;
        });

        // CORREÇÃO: Carrega Códigos VIP (Caminho correto: 'vips')
        onValue(ref(db, 'vips'), (snap) => {
            const container = document.getElementById('lista-codigos-ativos');
            container.innerHTML = "";
            if(!snap.exists()) { container.innerHTML = "<p style='padding:10px;color:#999'>Nenhum código disponível.</p>"; return; }
            snap.forEach(child => {
                const item = document.createElement('div');
                item.className = 'codigo-item';
                item.innerHTML = `<span><b>${child.key}</b></span>
                    <button class="btn-del-cod" onclick="apagarCodigo('${child.key}')"><i class="fa-solid fa-trash"></i></button>`;
                container.appendChild(item);
            });
        });
    }

    window.gerarCodigo = async function() {
        const h = document.getElementById('tempo-vip').value;
        const res = await fetch("https://x23wzp.onrender.com/gerar-vip", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ senha: SENHA_MASTER, duracaoHoras: parseInt(h) })
        });
        const data = await res.json();
        const btn = document.getElementById('btn-copiar');
        btn.style.display = "block";
        btn.innerText = data.codigo;
    }

    window.copiarCodigo = () => {
        navigator.clipboard.writeText(document.getElementById('btn-copiar').innerText);
        alert("Copiado!");
    }

    window.apagarCodigo = (cod) => confirm("Apagar código?") && remove(ref(db, 'vips/' + cod));

    window.abrirModal = (id, g) => {
        idSendoEditado = id;
        document.getElementById('edit-nome').value = g.nome;
        document.getElementById('edit-link').value = g.link;
        document.getElementById('edit-foto').value = g.foto || "";
        document.getElementById('edit-cod-vip').value = "";
        document.getElementById('modalEdicao').style.display = 'flex';
    }

    window.fecharModal = () => document.getElementById('modalEdicao').style.display = 'none';

    window.salvarEdicao = async () => {
        const cod = document.getElementById('edit-cod-vip').value.trim();
        if(cod !== "") {
            const res = await fetch("https://x23wzp.onrender.com/validar-vip", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ codigo: cod, grupoId: idSendoEditado })
            });
            if(!res.ok) { alert("Código VIP inválido!"); return; }
        }
        await update(ref(db, 'grupos/' + idSendoEditado), {
            nome: document.getElementById('edit-nome').value,
            link: document.getElementById('edit-link').value,
            foto: document.getElementById('edit-foto').value
        });
        alert("✅ Grupo Atualizado!");
        fecharModal();
    }

    window.excluirGrupo = (id) => confirm("Apagar?") && remove(ref(db, 'grupos/' + id));
    window.excluirAtual = () => { excluirGrupo(idSendoEditado); fecharModal(); }
</script>
</body>
</html>
