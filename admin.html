<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #b78cff; --vip: #ffd700; --danger: #ff4d4d; --success: #2ecc71; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; margin-bottom: 20px; box-sizing: border-box; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }

        /* Botão Copiar sem Frescura */
        #btn-copiar { background: #f0ebff; color: #7d5fff; border: 2px dashed var(--primary); margin-top: 15px; display: none; font-size: 18px; transition: 0.3s; }

        #area-admin { display: none; width: 100%; max-width: 450px; }
        
        .lista-codigos { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .codigo-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        
        .item-grupo { background: white; padding: 15px; margin-top: 12px; border-radius: 12px; border-left: 5px solid #ccc; position: relative; }
        .item-grupo.is-vip { border-left-color: var(--vip); background: #fffdf0; }
        
        .btns-acao-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .btns-acao-grid button { padding: 8px 0; font-size: 12px; margin-top: 0; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2 style="text-align:center;">🛡️ Admin</h2>
        <input type="text" id="user-input" placeholder="Usuário">
        <input type="password" id="pass-input" placeholder="Senha">
        <button onclick="logar()">ENTRAR</button>
    </div>

    <div id="area-admin">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px;">
            <span>User: <b>https67</b></span>
            <a href="#" onclick="logout()" style="color:red">Sair</a>
        </div>

        <div class="card">
            <h3>⭐ Criar VIP</h3>
            <select id="tempo-vip">
                <option value="24">24 Horas</option>
                <option value="48">48 Horas</option>
            </select>
            <button onclick="gerarCodigo()">GERAR AGORA</button>
            <button id="btn-copiar" onclick="copiarCodigo()"></button>
            
            <div id="lista-codigos-ativos" class="lista-codigos"></div>
        </div>

        <div id="lista-grupos"></div>
    </div>

    <div id="modalEdicao" class="modal">
        <div class="modal-content">
            <h3>Editar Grupo</h3>
            <input type="text" id="edit-nome" placeholder="Nome">
            <input type="text" id="edit-link" placeholder="Link">
            <input type="text" id="edit-foto" placeholder="Link Foto">
            <input type="text" id="edit-cod-vip" placeholder="COLE O CÓDIGO AQUI">
            <button onclick="salvarEdicao()" style="background:var(--success)">SALVAR ALTERAÇÕES</button>
            <button onclick="fecharModal()" style="background:#888; margin-top:5px">CANCELAR</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsrYjO2yVTemKqwmJRzNjh5sfaMalPqhE",
        authDomain: "cliques-4a2c1.firebaseapp.com",
        databaseURL: "https://cliques-4a2c1-default-rtdb.firebaseio.com",
        projectId: "cliques-4a2c1",
        storageBucket: "cliques-4a2c1.firebase storage.app",
        messagingSenderId: "903875153255",
        appId: "1:903875153255:web:ff3cf25e059b10d665b3c2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let SENHA_MASTER = localStorage.getItem('admin_acesso') || "";
    let idSendoEditado = null;

    if(SENHA_MASTER) mostrarPainel();

    window.logar = async function() {
        const u = document.getElementById('user-input').value;
        const s = document.getElementById('pass-input').value;
        if(u !== "https67") return alert("Usuário Errado");

        const res = await fetch("https://x23wzp.onrender.com/login-admin", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ senha: s })
        });

        if(res.ok) {
            SENHA_MASTER = s;
            localStorage.setItem('admin_acesso', s);
            mostrarPainel();
        } else { alert("Senha Errada"); }
    }

    function mostrarPainel() {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('area-admin').style.display = 'block';
        
        // Monitorar Códigos VIP
        onValue(ref(db, 'vips'), (snap) => {
            const cont = document.getElementById('lista-codigos-ativos');
            cont.innerHTML = "";
            snap.forEach(c => {
                const div = document.createElement('div');
                div.className = 'codigo-item';
                div.innerHTML = `<span>${c.key}</span><i class="fa fa-trash" style="color:red;cursor:pointer" onclick="apagarCod('${c.key}')"></i>`;
                cont.appendChild(div);
            });
        });

        // Monitorar Grupos
        onValue(ref(db, 'grupos'), (snap) => {
            const lista = document.getElementById('lista-grupos');
            lista.innerHTML = "";
            snap.forEach(c => {
                const g = c.val();
                const div = document.createElement('div');
                div.className = `item-grupo ${g.vip ? 'is-vip' : ''}`;
                div.innerHTML = `<b>${g.nome}</b> ${g.vip ? '⭐' : ''}
                    <div class="btns-acao-grid">
                        <button style="background:var(--blue)" onclick="abrirModal('${c.key}', ${JSON.stringify(g).replace(/"/g, '&quot;')})">EDITAR</button>
                        <button style="background:var(--danger)" onclick="excluirGrp('${c.key}')">DEL</button>
                    </div>`;
                lista.appendChild(div);
            });
        });
    }

    window.gerarCodigo = async function() {
        const h = document.getElementById('tempo-vip').value;
        const res = await fetch("https://x23wzp.onrender.com/gerar-vip", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ senha: SENHA_MASTER, duracaoHoras: parseInt(h) })
        });
        const data = await res.json();
        const b = document.getElementById('btn-copiar');
        b.innerText = data.codigo;
        b.style.display = "block";
    }

    window.copiarCodigo = () => {
        const b = document.getElementById('btn-copiar');
        navigator.clipboard.writeText(b.innerText);
        const original = b.innerText;
        b.innerText = "COPIADO!";
        setTimeout(() => { b.innerText = original; }, 1000);
    }

    window.abrirModal = (id, g) => {
        idSendoEditado = id;
        document.getElementById('edit-nome').value = g.nome;
        document.getElementById('edit-link').value = g.link;
        document.getElementById('edit-foto').value = g.foto || "";
        document.getElementById('edit-cod-vip').value = "";
        document.getElementById('modalEdicao').style.display = 'flex';
    }

    window.salvarEdicao = async () => {
        const cod = document.getElementById('edit-cod-vip').value.trim();
        const payload = {
            nome: document.getElementById('edit-nome').value,
            link: document.getElementById('edit-link').value,
            foto: document.getElementById('edit-foto').value
        };

        if(cod) {
            const res = await fetch("https://x23wzp.onrender.com/validar-vip", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ codigo: cod, grupoId: idSendoEditado })
            });
            if(!res.ok) return alert("CÓDIGO INVÁLIDO!");
        }

        await update(ref(db, 'grupos/' + idSendoEditado), payload);
        fecharModal();
    }

    window.apagarCod = (c) => remove(ref(db, 'vips/' + c));
    window.excluirGrp = (id) => confirm("Apagar?") && remove(ref(db, 'grupos/' + id));
    window.fecharModal = () => document.getElementById('modalEdicao').style.display = 'none';
    window.logout = () => { localStorage.clear(); location.reload(); };
</script>
</body>
</html>
