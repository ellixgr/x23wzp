<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sorteio Oficial</title>
    <style>
        :root {
            --led-blue: #00d2ff;
            --dark-bg: #0f111a;
            --success: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1e2e 0%, #0f111a 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        h2 { font-size: 24px; margin-bottom: 20px; color: #fff; }

        /* Zoom do QR Code sem abrir link */
        .qr-container {
            background: white;
            padding: 8px;
            border-radius: 15px;
            width: 160px;
            margin: 0 auto 15px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .qr-container.zoom {
            transform: scale(1.6);
            z-index: 100;
            position: relative;
        }
        .qr-container img { width: 100%; display: block; border-radius: 8px; }

        .pix-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid var(--led-blue);
        }

        .pix-value { font-size: 20px; font-weight: 800; color: var(--success); display: block; margin-bottom: 10px; }

        .copy-btn {
            background: var(--led-blue);
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
        }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; margin-bottom: 5px; display: block; color: #888; }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
        }

        .file-label {
            display: block;
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-send {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #333;
            color: white;
            font-weight: 800;
            cursor: not-allowed;
            margin-top: 10px;
        }

        .btn-send.ready {
            background: var(--success) !important;
            color: #000;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            background: var(--led-blue);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Participar do Sorteio</h2>

        <div class="qr-container" id="qrContainer" onclick="toggleZoom()">
            <img src="https://i.postimg.cc/BbKjRwF3/WA-1776479820106.jpg" alt="QR Code">
        </div>
        <p style="font-size: 10px; color: #666; margin-bottom: 15px;">Toque na imagem para dar zoom</p>

        <div class="pix-box">
            <span class="pix-value">R$ 0,11</span>
            <button class="copy-btn" onclick="copyPix()">COPIAR CHAVE PIX</button>
        </div>

        <div class="input-group">
            <label>NOME COMPLETO</label>
            <input type="text" id="nome" placeholder="Seu nome" oninput="validar()">
        </div>

        <div class="input-group">
            <label>COMPROVANTE</label>
            <label for="comprovante" class="file-label" id="file-label">
                <span id="file-text">Selecionar Imagem</span>
                <input type="file" id="comprovante" accept="image/*" style="display:none" onchange="validar()">
            </label>
        </div>

        <button id="btnEnviar" class="btn-send" onclick="enviarGmail()">ENVIAR PARA GMAIL</button>
    </div>

    <div id="toast" class="toast">Código copiado!</div>

    <script>
        const pixCode = "00020126970014BR.GOV.BCB.PIX013689a5c070-cdd1-443b-997d-0cbbcf80e2de0235JA PENSOU TU GANHAR 1 CONTO DO NADA52040000530398654040.115802BR5918Elias da Conceicao6009SAO PAULO62140510bRwkUSs8Zs63047D56";

        function toggleZoom() {
            document.getElementById('qrContainer').classList.toggle('zoom');
        }

        function copyPix() {
            navigator.clipboard.writeText(pixCode);
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function validar() {
            const nome = document.getElementById('nome').value;
            const file = document.getElementById('comprovante').files.length;
            const btn = document.getElementById('btnEnviar');
            
            if(file > 0) {
                document.getElementById('file-text').innerText = "✅ Selecionado";
                document.getElementById('file-label').style.borderColor = "var(--success)";
            }

            if(nome.length > 3 && file > 0) {
                btn.classList.add('ready');
            } else {
                btn.classList.remove('ready');
            }
        }

        function enviarGmail() {
            const nome = document.getElementById('nome').value;
            if(nome.length > 3 && document.getElementById('comprovante').files.length > 0) {
                const email = "sorteiofclx@gmail.com";
                const subject = encodeURIComponent("Sorteio: " + nome);
                const body = encodeURIComponent("Nome: " + nome + "\nComprovante em anexo.");
                window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
            }
        }
    </script>
</body>
</html>
