<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ PAINEL abareta PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #b78cff; --vip: #ffd700; --danger: #ff4d4d; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; max-width: 500px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 10px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-card p { margin: 5px 0 0; font-size: 18px; font-weight: bold; color: var(--primary); }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 15px; box-sizing: border-box; }
        input, select, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-weight: bold; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; }
        .lista-itens { background: #fafafa; border: 1px solid #eee; border-radius: 8px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; color: #333; }
        .item-video { border-left: 4px solid #ff4500; }
        .item-grupo { border-left: 4px solid var(--primary); }
        #area-painel { display: none; width: 100%; max-width: 500px; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2 style="text-align:center;">Login Admin</h2>
        <input type="password" id="pass-input" placeholder="Senha Mestra">
        <button onclick="logar()">ENTRAR</button>
    </div>

    <div id="area-painel">
        <div class="stats">
            <div class="stat-card"><h4>Grupos</h4><p id="c-grupos">0</p></div>
            <div class="stat-card"><h4>VIPs</h4><p id="c-vips">0</p></div>
            <div class="stat-card"><h4>Visitas</h4><p id="c-visitas">0</p></div>
        </div>

        <div class="card" style="border-top: 4px solid #ff4500;">
            <h3 style="margin:0; color:#ff4500;"><i class="fa fa-video"></i> Vídeos Shopee</h3>
            <input type="text" id="v-link" placeholder="Link do vídeo Shopee">
            <button onclick="addVideo()" style="background:#ff4500">ADICIONAR VÍDEO</button>
            <div id="lista-videos" class="lista-itens">Carregando vídeos...</div>
        </div>

        <div class="card">
            <h3 style="margin:0;"><i class="fa fa-users"></i> Grupos no Banco</h3>
            <div id="lista-grupos" class="lista-itens" style="max-height: 400px;">Carregando grupos...</div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, push } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsrYjO2yVTemKqwmJRzNjh5sfaMalPqhE",
        databaseURL: "https://cliques-4a2c1-default-rtdb.firebaseio.com",
        projectId: "cliques-4a2c1",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.logar = () => {
        if(document.getElementById('pass-input').value === "123") { // Ajuste sua senha aqui
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('area-painel').style.display = 'block';
            carregarTudo();
        } else { alert("Senha Errada!"); }
    };

    function carregarTudo() {
        // LÊ A RAIZ DO BANCO UMA VEZ E ATUALIZA TUDO
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            
            // 1. Atualizar Contadores
            const grupos = data.grupos || {};
            const videos = data.videos_shopee || {};
            document.getElementById('c-grupos').innerText = Object.keys(grupos).length;
            document.getElementById('c-visitas').innerText = data.visitas || 0;

            // 2. Renderizar Grupos
            const gLista = document.getElementById('lista-grupos');
            gLista.innerHTML = "";
            for(let id in grupos) {
                gLista.innerHTML += `
                    <div class="item item-grupo">
                        <span><b>${grupos[id].nome}</b> (${grupos[id].cliques || 0} clicks)</span>
                        <i class="fa fa-trash" style="color:red; cursor:pointer;" onclick="delItem('grupos/${id}')"></i>
                    </div>`;
            }

            // 3. Renderizar Vídeos
            const vLista = document.getElementById('lista-videos');
            vLista.innerHTML = "";
            for(let id in videos) {
                vLista.innerHTML += `
                    <div class="item item-video">
                        <span style="font-size:10px; overflow:hidden;">${videos[id].link.substring(0,40)}...</span>
                        <i class="fa fa-trash" style="color:red; cursor:pointer;" onclick="delItem('videos_shopee/${id}')"></i>
                    </div>`;
            }
        });
    }

    window.addVideo = () => {
        const link = document.getElementById('v-link').value;
        if(link) push(ref(db, 'videos_shopee'), { link: link }).then(() => {
            document.getElementById('v-link').value = "";
            alert("Vídeo salvo!");
        });
    };

    window.delItem = (path) => {
        if(confirm("Deseja apagar?")) remove(ref(db, path));
    };
</script>
</body>
</html>
