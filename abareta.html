<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - FLOW X</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .stats-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h3 { margin: 0; font-size: 12px; color: #777; text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 24px; font-weight: bold; color: #9b59b6; }
        .admin-section { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #9b59b6; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-delete { background: #e74c3c; margin-top: 5px; padding: 5px; font-size: 12px; }
        .grupo-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .vip-tag { color: #f1c40f; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="card"><h3>Grupos</h3><p id="count-grupos">0</p></div>
        <div class="card"><h3>VIPs</h3><p id="count-vips">0</p></div>
        <div class="card"><h3>Visitas</h3><p id="count-visitas">0</p></div>
    </div>

    <div class="admin-section">
        <h3>⭐ Gerar Código VIP</h3>
        <select id="tempo-vip">
            <option value="24">24 Horas</option>
            <option value="48">48 Horas</option>
            <option value="168">7 Dias (Semana)</option>
        </select>
        <button onclick="gerarCodigo()">GERAR NOVO CÓDIGO</button>
        <div id="codigo-gerado" style="margin-top: 10px; font-weight: bold; color: #27ae60; text-align: center;"></div>
    </div>

    <div class="admin-section">
        <h3>LISTA DE GRUPOS</h3>
        <div id="lista-grupos">Carregando...</div>
    </div>

    <script>
        // Configuração extraída dos seus dados anteriores
        const firebaseConfig = {
            apiKey: "AIzaSyDsrYjO2yVTemKqwmJRzNjh5sfaMalPqhE",
            authDomain: "cliques-4a2c1.firebaseapp.com",
            databaseURL: "https://cliques-4a2c1-default-rtdb.firebaseio.com",
            projectId: "cliques-4a2c1",
            storageBucket: "cliques-4a2c1.appspot.com",
            messagingSenderId: "903875153255",
            appId: "1:903875153255:web:ff3cf25e059b10d665b3c2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Carregar dados em tempo real
        function carregarPainel() {
            // Grupos
            db.ref('grupos').on('value', (snapshot) => {
                const grupos = snapshot.val();
                const lista = document.getElementById('lista-grupos');
                lista.innerHTML = "";
                let total = 0;
                let vips = 0;

                if (grupos) {
                    for (let id in grupos) {
                        total++;
                        if (grupos[id].vip) vips++;
                        
                        lista.innerHTML += `
                            <div class="grupo-item">
                                <div>
                                    <strong>${grupos[id].nome}</strong> ${grupos[id].vip ? '<span class="vip-tag">[VIP]</span>' : ''}<br>
                                    <small>${grupos[id].cliques || 0} cliques</small>
                                </div>
                                <button class="btn-delete" onclick="excluirGrupo('${id}')">APAGAR</button>
                            </div>
                        `;
                    }
                } else {
                    lista.innerHTML = "Nenhum grupo cadastrado.";
                }
                document.getElementById('count-grupos').innerText = total;
                document.getElementById('count-vips').innerText = vips;
            });

            // Visitas totais
            db.ref('visitas').on('value', (snapshot) => {
                document.getElementById('count-visitas').innerText = snapshot.val() || 0;
            });
        }

        function gerarCodigo() {
            const horas = document.getElementById('tempo-vip').value;
            const codigo = "VIP-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            
            db.ref('codigos_vip/' + codigo).set({
                duracao: parseInt(horas),
                usado: false
            }).then(() => {
                document.getElementById('codigo-gerado').innerText = "Código: " + codigo;
            });
        }

        function excluirGrupo(id) {
            if (confirm("Deseja apagar este grupo?")) {
                db.ref('grupos/' + id).remove();
            }
        }

        carregarPainel();
    </script>
</body>
</html>
