<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ PAINEL abareta PRO - GESTÃO OFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* MANTENDO SEU ESTILO ORIGINAL */
        :root { --primary: #b78cff; --vip: #ffd700; --danger: #ff4d4d; --success: #2ecc71; --blue: #3498db; --boost: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        .stats-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; max-width: 500px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card h4 { margin: 0; font-size: 12px; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 18px; font-weight: bold; color: var(--primary); }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-weight: bold; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; }

        .card-solicitacao { border-top: 5px solid var(--boost); background: #fffcf0; }
        .btn-aprovar { background: var(--success) !important; flex: 1; }
        .btn-reprovar { background: var(--danger) !important; flex: 1; }

        #btn-copiar { background: #f0ebff; color: #7d5fff; border: 2px dashed var(--primary); margin-top: 15px; display: none; font-size: 18px; }
        #area-abareta { display: none; width: 100%; max-width: 500px; }
        
        .lista-codigos { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .codigo-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        .codigo-item i { color: var(--danger); cursor: pointer; }

        .item-grupo { background: white; padding: 15px; margin-top: 12px; border-radius: 12px; border-left: 5px solid #ccc; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-grupo.is-vip { border-left-color: var(--vip); background: #fffdf0; }
        
        .info-resumo { font-size: 11px; color: #555; margin-top: 8px; padding: 10px; background: #f1f4f9; border-radius: 8px; border: 1px solid #e0e6ed; }

        .btns-acao-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .btns-acao-grid button { padding: 8px 0; font-size: 10px; margin-top: 0; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
        label { font-size: 11px; font-weight: bold; color: #888; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2 style="text-align:center; color:var(--primary)">Login abareta</h2>
        <input type="email" id="user-input" placeholder="Seu E-mail">
        <input type="password" id="pass-input" placeholder="Sua Senha">
        <button onclick="logar()">ENTRAR NO PAINEL</button>
    </div>

    <div id="area-abareta">
        <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px;">
            <span id="label-user" style="font-size: 12px; color: #888;">Logado: <b>...</b></span>
            <a href="#" onclick="logout()" style="color:red; font-size: 12px; text-decoration: none; font-weight: bold;">SAIR</a>
        </div>

        <div class="stats-container">
            <div class="stat-card"><h4>Grupos</h4><p id="count-total">0</p></div>
            <div class="stat-card"><h4>VIPs</h4><p id="count-vip">0</p></div>
            <div class="stat-card"><h4>Visitas</h4><p id="count-visitas">0</p></div>
        </div>

        <h2 style="font-size: 16px; color: var(--boost); width: 100%; text-align: left;"><i class="fa fa-clock"></i> AGUARDANDO APROVAÇÃO</h2>
        <div id="lista-solicitacoes" style="width: 100%; margin-bottom: 30px;"></div>

        <div class="card" style="border-top: 4px solid var(--success);">
            <h3 style="margin:0; color: var(--success);"><i class="fa fa-coins"></i> Dar Moedas por ID</h3>
            <input type="text" id="moeda-user-id" placeholder="ID do Usuário">
            <input type="number" id="moeda-qtd" placeholder="Quantidade">
            <button onclick="adicionarMoedasManual()" style="background:var(--success)">ENTREGAR MOEDAS</button>
        </div>

        <div class="card">
            <h3 style="margin:0">⭐ Códigos VIP</h3>
            <select id="tempo-vip">
                <option value="2">2 Horas</option>
                <option value="24">24 Horas</option>
                <option value="48">48 Horas</option>
            </select>
            <button onclick="gerarCodigo()">GERAR NOVO CÓDIGO</button>
            <button id="btn-copiar" onclick="copiarCodigo()"></button>
            <div id="lista-codigos-ativos" class="lista-codigos">Carregando...</div>
        </div>

        <div class="card" style="border-top: 4px solid #ff4500;">
            <h3 style="margin:0; color: #ff4500;"><i class="fa fa-video"></i> Vídeos Shopee</h3>
            <input type="text" id="novo-video-link" placeholder="Link Shopee">
            <button onclick="adicionarVideo()" style="background:#ff4500">ADICIONAR VÍDEO</button>
            <div id="lista-videos-shopee" class="lista-codigos">Carregando...</div>
        </div>

        <h2 style="font-size: 16px; color: #555; width: 100%; text-align: left;">GRUPOS ATIVOS NO SITE</h2>
        <div id="lista-grupos" style="width: 100%;"></div>
    </div>

    <div id="modalReprovar" class="modal">
        <div class="modal-content">
            <h3>Reprovar Grupo</h3>
            <label>MOTIVO DA REPROVAÇÃO</label>
            <input type="text" id="motivo-reprovar" placeholder="Ex: Link quebrado, foto inadequada...">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="confirmar-reprovar-btn" style="background:var(--danger)">CONFIRMAR REPROVAÇÃO</button>
                <button onclick="document.getElementById('modalReprovar').style.display='none'" style="background:#888">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modalEdicao" class="modal">
        <div class="modal-content">
            <h3>Editar Grupo</h3>
            <label>NOME</label><input type="text" id="edit-nome">
            <label>LINK WHATSAPP</label><input type="text" id="edit-link">
            <label>LINK FOTO</label><input type="text" id="edit-foto">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="salvarEdicao()" style="background:var(--success)">SALVAR</button>
                <button onclick="fecharModal()" style="background:#888">CANCELAR</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, update, get, push, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsrYjO2yVTemKqwmJRzNjh5sfaMalPqhE",
        databaseURL: "https://cliques-4a2c1-default-rtdb.firebaseio.com",
        projectId: "cliques-4a2c1",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let gruposCache = {};
    let idSendoEditado = null;

    // LOGIN
    window.logar = async function() {
        const email = document.getElementById('user-input').value;
        const pass = document.getElementById('pass-input').value;
        try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Erro de login."); }
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('label-user').innerHTML = `Logado: <b>${user.email}</b>`;
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('area-abareta').style.display = 'block';
            carregarDados();
            carregarSolicitacoes(); 
        } else {
            document.getElementById('login-box').style.display = 'block';
            document.getElementById('area-abareta').style.display = 'none';
        }
    });

    // CARREGAR SOLICITAÇÕES COM FILTRO DE STATUS
    function carregarSolicitacoes() {
        onValue(ref(db, 'solicitacoes'), (snapshot) => {
            const lista = document.getElementById('lista-solicitacoes');
            lista.innerHTML = "";
            const dados = snapshot.val();
            if (!dados) { lista.innerHTML = "<p style='font-size:12px; color:#999'>Nenhuma solicitação pendente.</p>"; return; }

            let temPendente = false;
            for (const key in dados) {
                const s = dados[key];
                // IMPORTANTE: Só mostra se estiver "pendente"
                if (s.status !== "pendente") continue; 
                temPendente = true;

                const div = document.createElement('div');
                div.className = "item-grupo card-solicitacao";
                div.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${s.foto || 'https://via.placeholder.com/50'}" style="width:45px; height:45px; border-radius:8px; object-fit:cover;">
                        <div><b>${s.nome}</b> <br><small>${s.categoria}</small></div>
                    </div>
                    <div class="info-resumo">ID Dono: ${s.dono} <br>Link: ${s.link}</div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button class="btn-aprovar" onclick="gerenciarSolicitacao('${key}', 'aprovado')">APROVAR</button>
                        <button class="btn-reprovar" onclick="abrirModalReprovar('${key}')">REPROVAR</button>
                    </div>`;
                lista.appendChild(div);
            }
            if(!temPendente) lista.innerHTML = "<p style='font-size:12px; color:#999'>Nenhuma solicitação pendente.</p>";
        });
    }

    // APROVAÇÃO E REPROVAÇÃO CORRIGIDA
    window.gerenciarSolicitacao = async (id, novoStatus, motivo = "") => {
        const sRef = ref(db, `solicitacoes/${id}`);
        const snap = await get(sRef);
        if (!snap.exists()) return;
        const dados = snap.val();

        if (novoStatus === 'aprovado') {
            // 1. Cria o grupo na lista oficial
            await set(ref(db, `grupos/${id}`), {
                ...dados,
                status: "aprovado",
                cliques: 0,
                criadoEm: Date.now()
            });
            // 2. Remove das solicitações para sumir do painel
            await remove(sRef);
            alert("Aprovado!");
        } else {
            // 1. Apenas atualiza o status para sumir da lista "pendente"
            // 2. Mantém no banco para o usuário ver o motivo da reprovação
            await update(sRef, { status: "reprovado", motivo: motivo });
            alert("Reprovado com sucesso.");
        }
    };

    window.abrirModalReprovar = (id) => {
        document.getElementById('modalReprovar').style.display = 'flex';
        document.getElementById('confirmar-reprovar-btn').onclick = () => {
            const motivo = document.getElementById('motivo-reprovar').value;
            if(!motivo) return alert("Dê um motivo!");
            gerenciarSolicitacao(id, 'reprovado', motivo);
            document.getElementById('modalReprovar').style.display = 'none';
        };
    };

    // MANTENDO TODAS AS SUAS OUTRAS FUNÇÕES
    function carregarDados() {
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            const lista = document.getElementById('lista-grupos');
            lista.innerHTML = "";
            gruposCache = data.grupos || {};
            const agora = Date.now();
            let t = 0, v = 0;

            for (const key in gruposCache) {
                const g = gruposCache[key]; t++;
                const isVip = g.vip === true && g.vipAte > agora;
                if(isVip) v++;
                const div = document.createElement('div');
                div.className = `item-grupo ${isVip ? 'is-vip' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${g.foto || 'https://via.placeholder.com/50'}" style="width:45px; height:45px; border-radius:8px; object-fit:cover;">
                        <b>${g.nome}</b>
                    </div>
                    <div class="btns-acao-grid">
                        <button style="background:var(--blue)" onclick="abrirModal('${key}')">EDITAR</button>
                        <button style="background:var(--danger)" onclick="excluirGrp('${key}')">DEL</button>
                    </div>`;
                lista.appendChild(div);
            }
            document.getElementById('count-total').innerText = t;
            document.getElementById('count-vip').innerText = v;
            document.getElementById('count-visitas').innerText = data.visitas || 0;
            renderListaSimples('lista-videos-shopee', data.videos_shopee, 'apagarVideo', 'link');
            renderListaSimples('lista-codigos-ativos', data.codigos_vips, 'apagarCod', null);
        });
    }

    function renderListaSimples(elementId, obj, funcName, field) {
        const el = document.getElementById(elementId); el.innerHTML = "";
        if(!obj) { el.innerHTML = "<p style='font-size:10px; padding:10px;'>Vazio</p>"; return; }
        for(let id in obj) {
            const txt = field ? (obj[id][field] ? obj[id][field].substring(0,20) : id) : id;
            el.innerHTML += `<div class="codigo-item"><span>${txt}</span><i class="fa fa-trash" onclick="${funcName}('${id}')"></i></div>`;
        }
    }

    window.adicionarMoedasManual = async function() {
        const id = document.getElementById('moeda-user-id').value.trim();
        const qtd = parseInt(document.getElementById('moeda-qtd').value);
        const uRef = ref(db, 'usuarios/' + id);
        const s = await get(uRef);
        let m = s.exists() ? (s.val().moedas || 0) : 0;
        await update(uRef, { moedas: m + qtd });
        alert("Moedas entregues!");
    }

    window.gerarCodigo = async () => {
        const h = parseInt(document.getElementById('tempo-vip').value);
        const cod = "VIP-" + Math.random().toString(36).substring(2, 8).toUpperCase();
        await update(ref(db, 'codigos_vips/' + cod), { horas: h, usado: false });
        document.getElementById('btn-copiar').innerText = cod;
        document.getElementById('btn-copiar').style.display = "block";
    }

    window.copiarCodigo = () => { navigator.clipboard.writeText(document.getElementById('btn-copiar').innerText); alert("Copiado!"); }
    window.abrirModal = (id) => { idSendoEditado = id; const g = gruposCache[id]; document.getElementById('edit-nome').value = g.nome; document.getElementById('edit-link').value = g.link; document.getElementById('edit-foto').value = g.foto||""; document.getElementById('modalEdicao').style.display='flex'; }
    window.salvarEdicao = async () => { await update(ref(db, 'grupos/'+idSendoEditado), { nome: document.getElementById('edit-nome').value, link: document.getElementById('edit-link').value, foto: document.getElementById('edit-foto').value }); fecharModal(); }
    window.fecharModal = () => document.getElementById('modalEdicao').style.display='none';
    window.excluirGrp = (id) => confirm("Apagar?") && remove(ref(db, 'grupos/'+id));
    window.apagarVideo = (id) => remove(ref(db, 'videos_shopee/'+id));
    window.apagarCod = (id) => remove(ref(db, 'codigos_vips/'+id));
    window.adicionarVideo = () => {
        const link = document.getElementById('novo-video-link').value;
        if(link) push(ref(db, 'videos_shopee'), { link: link }).then(() => document.getElementById('novo-video-link').value="");
    };
    window.logout = () => signOut(auth);
</script>
</body>
</html>
